<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Stichai — AI Embroidery Digitizer</title>
  <style>
    /* All existing styles from v71, plus: */
    .progress-container { width:100%; background:#e0e0e0; border-radius:8px; margin:12px 0; height:20px; overflow:hidden; }
    .progress-bar { width:0%; height:100%; background:var(--red); transition:width 0.3s; }
    .cancel-btn { background:#555; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; margin-left:8px; }
    .brush-preview { position:absolute; border-radius:50%; border:2px solid red; background:rgba(255,0,0,0.3); pointer-events:none; transform:translate(-50%,-50%); z-index:10; display:none; }
    .history-btns { display:flex; gap:6px; margin:8px 0; }
  </style>
</head>
<body>
  <!-- navigation, hero, features same as v71 -->

  <div class="app-inner">
    <!-- ... same cards ... -->
    <div class="card" id="mc">
      <div class="stage-label">Step 2: Remove areas (optional)</div>
      <div class="mask-wrap" id="mw">
        <canvas id="c1"></canvas><canvas id="c2"></canvas><canvas id="c3"></canvas>
        <div class="mask-idle-overlay" id="maskIdleOverlay"><div class="idle-ring"></div><p>Tap the subject you want to embroider</p></div>
        <div class="mask-detect-overlay" style="display:none"><div class="detect-spinner"></div><p>Detecting…</p></div>
      </div>
      <div class="history-btns">
        <button onclick="undoMask()">↶ Undo</button>
        <button onclick="redoMask()">↷ Redo</button>
      </div>
      <div class="manual-toggle" onclick="toggleManualTools()">✎ Manual touch-up <span class="marrow">▼</span></div>
      <div class="manual-tools-panel" id="manualToolsPanel">
        <div class="tools">
          <button class="on" onclick="setTool('brush',this)">🖌️ Remove</button>
          <button onclick="setTool('eraser',this)">❌ Undo</button>
          <button onclick="clearMask()">🗑️ Clear</button>
          <button onclick="setBrushSize(15,this)">S</button>
          <button class="on" onclick="setBrushSize(35,this)">M</button>
          <button onclick="setBrushSize(70,this)">L</button>
          <button onclick="setBrushSize(120,this)">XL</button>
        </div>
        <button class="btn" id="aB" onclick="analyze()">🔍 Analyze</button>
      </div>
      <div class="mask-confirm-bar" id="maskConfirmBar" style="display:none">...</div>
    </div>

    <div class="card" id="sc" style="display:none">
      <!-- same as v71 -->
      <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
      <div id="progressMsg" style="font-size:12px; margin-bottom:8px;"></div>
      <button class="cancel-btn" id="cancelBtn" onclick="cancelGeneration()" style="display:none">Cancel</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // --------------------------------------------------------------
    // MASK UNDO/REDO
    let maskHistory = [];
    let maskHistoryIndex = -1;

    function saveMaskState() {
      if (!c2) return;
      const dataURL = c2.toDataURL();
      maskHistory = maskHistory.slice(0, maskHistoryIndex + 1);
      maskHistory.push(dataURL);
      maskHistoryIndex++;
      if (maskHistory.length > 20) maskHistory.shift();
    }

    function restoreMask(index) {
      if (!c2 || !maskHistory[index]) return;
      const img = new Image();
      img.onload = () => {
        const ctx = c2.getContext('2d');
        ctx.clearRect(0, 0, c2.width, c2.height);
        ctx.drawImage(img, 0, 0);
      };
      img.src = maskHistory[index];
    }

    function undoMask() {
      if (maskHistoryIndex > 0) {
        maskHistoryIndex--;
        restoreMask(maskHistoryIndex);
      }
    }

    function redoMask() {
      if (maskHistoryIndex < maskHistory.length - 1) {
        maskHistoryIndex++;
        restoreMask(maskHistoryIndex);
      }
    }

    // Override drawing functions to save state before each stroke
    const originalDraw = window.dm;
    window.dm = function(e) {
      if (!dr) return;
      saveMaskState();
      originalDraw(e);
    };

    // BRUSH PREVIEW CIRCLE
    let previewDiv = null;
    function showBrushPreview(x, y) {
      if (!previewDiv) {
        previewDiv = document.createElement('div');
        previewDiv.className = 'brush-preview';
        document.body.appendChild(previewDiv);
      }
      previewDiv.style.width = sz*2 + 'px';
      previewDiv.style.height = sz*2 + 'px';
      previewDiv.style.left = x + 'px';
      previewDiv.style.top = y + 'px';
      previewDiv.style.display = 'block';
    }
    function hideBrushPreview() { if(previewDiv) previewDiv.style.display = 'none'; }
    document.addEventListener('mousemove', (e) => { if(dr && tl==='brush') showBrushPreview(e.clientX, e.clientY); });
    document.addEventListener('mouseup', hideBrushPreview);
    // Touch version similarly

    // --------------------------------------------------------------
    // WEB SOCKET + PROGRESS + CANCEL
    let socket = null;
    let currentJobId = null;

    function connectWebSocket() {
      socket = io();
      socket.on('progress', (data) => {
        if (data.jobId === currentJobId) {
          document.getElementById('progressBar').style.width = data.progress + '%';
          document.getElementById('progressMsg').innerText = data.message || `Progress: ${data.progress}%`;
        }
      });
    }
    connectWebSocket();

    async function generate() {
      // ... existing validation ...
      currentJobId = Date.now().toString(36) + Math.random().toString(36).slice(2);
      const socketId = socket.id;
      const fd = new FormData();
      fd.append('image', cf);
      fd.append('detectionId', ci);
      fd.append('selectedColors', JSON.stringify(sc));
      fd.append('selectedShapes', JSON.stringify(ss));
      fd.append('fabric', document.getElementById('fb').value);
      fd.append('machine', document.getElementById('mb').value);
      fd.append('hoop', document.getElementById('hp').value);
      fd.append('density', document.getElementById('ds').value);
      if (bBox.checked) fd.append('bastingBox', '1');
      fd.append('colorMerges', JSON.stringify(colorMerges));
      fd.append('lockedColors', JSON.stringify(locked));
      fd.append('x-socket-id', socketId);

      document.getElementById('progressBar').style.width = '0%';
      document.getElementById('cancelBtn').style.display = 'inline-block';
      document.getElementById('gB').disabled = true;

      const resp = await fetch('/generate-embroidery', { method: 'POST', body: fd });
      const data = await resp.json();
      if (!data.success) throw new Error(data.error);
      socket.emit('subscribe', data.id);
      // poll for result? Or use WebSocket for completion
      // For simplicity, we'll wait for job completion endpoint
      checkJobStatus(data.id);
    }

    async function checkJobStatus(jobId) {
      const interval = setInterval(async () => {
        const resp = await fetch(`/job-status/${jobId}`);
        const data = await resp.json();
        if (data.status === 'done') {
          clearInterval(interval);
          displayResult(data.result);
          document.getElementById('cancelBtn').style.display = 'none';
        } else if (data.status === 'failed') {
          clearInterval(interval);
          alert('Generation failed: ' + data.error);
          document.getElementById('cancelBtn').style.display = 'none';
        }
      }, 1000);
    }

    function cancelGeneration() {
      if (socket && currentJobId) socket.emit('cancel', currentJobId);
      document.getElementById('cancelBtn').disabled = true;
    }

    // BATCH DOWNLOAD
    async function batchDownload() {
      if (!currentJobId) return;
      const a = document.createElement('a');
      a.href = `/download-batch/${currentJobId}`;
      a.download = 'stichai-batch.zip';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    // Add button in Step 4
    const dlDiv = document.querySelector('#rc .btns');
    const batchBtn = document.createElement('button');
    batchBtn.className = 'btn btn-secondary';
    batchBtn.innerHTML = '📦 Download All (DST+PES+JEF+PDF)';
    batchBtn.onclick = batchDownload;
    dlDiv.appendChild(batchBtn);
  </script>
</body>
</html>
