<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Bot Assistant</title>
    <style>
      /* -----------------------------------------------------------------------
         Base reset & layout
      ----------------------------------------------------------------------- */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 1rem;
      }

      /* -----------------------------------------------------------------------
         Chat widget
      ----------------------------------------------------------------------- */
      .chat-widget {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 640px;
        height: 80vh;
        max-height: 720px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
        overflow: hidden;
      }

      /* Header */
      .chat-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem 1.25rem;
        background: #4f46e5;
        color: #ffffff;
        flex-shrink: 0;
      }

      .chat-header__avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        flex-shrink: 0;
      }

      .chat-header__title {
        font-size: 1rem;
        font-weight: 600;
        line-height: 1.2;
      }

      .chat-header__subtitle {
        font-size: 0.75rem;
        opacity: 0.8;
      }

      /* Message list */
      #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        scroll-behavior: smooth;
      }

      #chat-messages::-webkit-scrollbar {
        width: 6px;
      }

      #chat-messages::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 3px;
      }

      /* Message rows */
      .chat-message {
        display: flex;
        max-width: 80%;
      }

      .chat-message--user {
        align-self: flex-end;
        flex-direction: row-reverse;
      }

      .chat-message--bot {
        align-self: flex-start;
      }

      /* Bubbles */
      .chat-bubble {
        display: inline-block;
        padding: 0.55rem 0.9rem;
        border-radius: 18px;
        font-size: 0.9rem;
        line-height: 1.45;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .chat-message--user .chat-bubble {
        background: #4f46e5;
        color: #ffffff;
        border-bottom-right-radius: 4px;
      }

      .chat-message--bot .chat-bubble {
        background: #f3f4f6;
        color: #111827;
        border-bottom-left-radius: 4px;
      }

      /* Input area */
      .chat-footer {
        flex-shrink: 0;
        border-top: 1px solid #e5e7eb;
        padding: 0.75rem 1rem;
        background: #ffffff;
      }

      #chat-form {
        display: flex;
        gap: 0.5rem;
        align-items: flex-end;
      }

      #chat-input {
        flex: 1;
        resize: none;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 0.55rem 0.85rem;
        font-size: 0.9rem;
        font-family: inherit;
        line-height: 1.45;
        outline: none;
        transition: border-color 0.15s;
        min-height: 42px;
        max-height: 120px;
        overflow-y: auto;
      }

      #chat-input:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
      }

      #chat-input:disabled {
        background: #f9fafb;
        color: #9ca3af;
        cursor: not-allowed;
      }

      #chat-send {
        flex-shrink: 0;
        width: 42px;
        height: 42px;
        border: none;
        border-radius: 8px;
        background: #4f46e5;
        color: #ffffff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, transform 0.1s;
        font-size: 1.1rem;
      }

      #chat-send:hover:not(:disabled) {
        background: #4338ca;
      }

      #chat-send:active:not(:disabled) {
        transform: scale(0.95);
      }

      #chat-send:disabled {
        background: #a5b4fc;
        cursor: not-allowed;
      }

      /* Status bar */
      .chat-status {
        font-size: 0.7rem;
        color: #6b7280;
        text-align: center;
        padding: 0.35rem 0 0;
        min-height: 1.2em;
      }

      /* -----------------------------------------------------------------------
         Accessibility: focus-visible ring
      ----------------------------------------------------------------------- */
      :focus-visible {
        outline: 2px solid #4f46e5;
        outline-offset: 2px;
      }

      /* -----------------------------------------------------------------------
         Responsive
      ----------------------------------------------------------------------- */
      @media (max-width: 480px) {
        .chat-widget {
          height: 100vh;
          max-height: none;
          border-radius: 0;
        }

        body {
          padding: 0;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <!-- -----------------------------------------------------------------------
         Chat widget markup
    ------------------------------------------------------------------------ -->
    <main class="chat-widget" role="main" aria-label="Chat Assistant">
      <!-- Header -->
      <header class="chat-header">
        <div class="chat-header__avatar" aria-hidden="true">🤖</div>
        <div>
          <div class="chat-header__title">Assistant</div>
          <div class="chat-header__subtitle">Online · Typically replies instantly</div>
        </div>
      </header>

      <!-- Message list -->
      <section
        id="chat-messages"
        role="log"
        aria-live="polite"
        aria-label="Conversation"
        aria-relevant="additions"
      ></section>

      <!-- Input area -->
      <footer class="chat-footer">
        <form id="chat-form" novalidate autocomplete="off">
          <textarea
            id="chat-input"
            name="message"
            rows="1"
            placeholder="Type a message…"
            aria-label="Message input"
            maxlength="2000"
            spellcheck="true"
          ></textarea>
          <button
            id="chat-send"
            type="submit"
            aria-label="Send message"
            title="Send message"
          >
            &#10148;
          </button>
        </form>
        <p class="chat-status" id="chat-status" role="status" aria-live="polite"></p>
      </footer>
    </main>

    <!-- -----------------------------------------------------------------------
         Script load order — strict dependency chain (Phase 3 – Steps 9 & 10)

         Load strategy: plain <script> tags at end-of-body (no defer/async) to
         guarantee synchronous, sequential evaluation in document order:

           1. session.js      — SessionManager global
           2. classifier.js   — Classifier global
           3. bot-events.js   — BotEvents global
           4. bot.js          — Bot orchestrator (depends on all three above)

         DO NOT reorder, add async, or move these tags into <head> without
         updating the dependency guards in bot.js.
    ------------------------------------------------------------------------ -->
    <script src="session.js"></script>
    <script src="classifier.js"></script>
    <script src="bot-events.js"></script>
    <script src="bot.js"></script><script src="/socket.io/socket.io.js"></script><script>(function(){const chatForm=document.getElementById("chat-form");const chatInput=document.getElementById("chat-input");const chatMessages=document.getElementById("chat-messages");const chatSend=document.getElementById("chat-send");const chatStatus=document.getElementById("chat-status");const MAX_LOG=500;const MAX_INPUT=2000;let jobPollers=new Map();let socket=null;let processing=false;function setProcessing(v){processing=v;chatSend.disabled=v;chatInput.disabled=v;}function scrollBottom(){chatMessages.scrollTop=chatMessages.scrollHeight;}function setStatus(text,type){chatStatus.textContent=text;if(type)chatStatus.style.color=type==="error"?"#dc2626":type==="progress"?"#4f46e5":"#6b7280";else chatStatus.style.color="#6b7280";}function trimLog(){while(chatMessages.children.length>MAX_LOG){chatMessages.removeChild(chatMessages.firstChild);}}function logMessage(text,type){const row=document.createElement("div");row.classList.add("chat-message");if(type==="user"){row.classList.add("chat-message--user");}else{row.classList.add("chat-message--bot");}const bubble=document.createElement("span");bubble.classList.add("chat-bubble");bubble.textContent=text;row.appendChild(bubble);chatMessages.appendChild(row);trimLog();scrollBottom();}function trackJob(jobId){if(jobPollers.has(jobId))return;jobPollers.set(jobId,{status:"processing",pollTimer:null});if(socket&&socket.connected){socket.emit("subscribe",jobId);}else{startPolling(jobId);}}function startPolling(jobId){const job=jobPollers.get(jobId);if(!job||job.pollTimer)return;function poll(){fetch("/job-status/"+encodeURIComponent(jobId)).then(r=>r.json()).then(data=>{if(data.status==="done"||data.progress===100){stopPolling(jobId);logMessage("Job "+jobId+" complete: "+JSON.stringify(data),"system");setStatus("done");}else if(data.status==="error"){stopPolling(jobId);logMessage("Job "+jobId+" error: "+JSON.stringify(data),"error");setStatus("error","error");}else{logMessage(data.message||("Processing: "+(data.progress||0)+"%"),"progress");setStatus("processing ("+(data.progress||0)+"%)","progress");}}).catch(e=>{stopPolling(jobId);logMessage("Polling failed: "+e.message,"error");setStatus("error","error");});}job.pollTimer=setInterval(poll,2000);poll();}function stopPolling(jobId){const job=jobPollers.get(jobId);if(job&&job.pollTimer){clearInterval(job.pollTimer);job.pollTimer=null;}}function initSocket(){if(typeof io==="undefined"){logMessage("Socket.IO not loaded; using polling fallback","system");return;}socket=io();socket.on("connect",()=>{logMessage("Connected to server","system");setStatus("connected");for(const[jobId]of jobPollers){socket.emit("subscribe",jobId);stopPolling(jobId);}});socket.on("disconnect",()=>{logMessage("Disconnected; switching to polling","system");setStatus("disconnected","error");for(const[jobId]of jobPollers){startPolling(jobId);}});socket.on("progress",(data)=>{const{jobId,progress,message}=data;logMessage(message||("Progress: "+(progress||0)+"%"),"progress");setStatus("processing ("+(progress||0)+"%)","progress");if(progress>=100){stopPolling(jobId);setStatus("done");}});socket.on("connect_error",()=>{logMessage("Socket connection failed; using polling","error");});}function pickFile(accept){return new Promise(resolve=>{const input=document.createElement("input");input.type="file";input.accept=accept;input.style.display="none";document.body.appendChild(input);let resolved=false;function cleanup(){window.removeEventListener("focus",onFocus);}function onFocus(){setTimeout(()=>{if(!resolved&&input.parentNode){document.body.removeChild(input);resolve(null);cleanup();}},300);cleanup();}input.addEventListener("change",()=>{resolved=true;document.body.removeChild(input);resolve(input.files[0]||null);cleanup();});window.addEventListener("focus",onFocus);input.click();});}async function uploadFormData(url,formData){const res=await fetch(url,{method:"POST",body:formData});if(!res.ok){const text=await res.text().catch(()=>res.statusText);throw new Error("HTTP "+res.status+": "+text);}const json=await res.json();return json;}async function handleCommand(cmd){setProcessing(true);try{const parts=cmd.trim().split(/\s+/);const action=parts[0].toLowerCase();const arg=parts[1]||"";switch(action){case"/help":logMessage("Commands:/segment - Segment subject from image\n/shapes - Detect shapes (image+mask)\n/embroider - Generate embroidery (image+mask)\n/status <id> - Get job status\n/preview <id> - Open preview\n/download <id> - Get download link\n/help - This menu","system");break;case"/segment":{const file=await pickFile("image/*");if(!file){logMessage("Upload cancelled","system");break;}setStatus("uploading","progress");try{const fd=new FormData();fd.append("image",file);const json=await uploadFormData("/segment-subject",fd);logMessage("Job started: "+JSON.stringify(json),"system");setStatus("processing");if(json.jobId)trackJob(json.jobId);}catch(e){logMessage("Error: "+e.message,"error");setStatus("error","error");}break;}case"/shapes":{const imageFile=await pickFile("image/*");if(!imageFile){logMessage("Upload cancelled","system");break;}const maskFile=await pickFile("image/*");if(!maskFile){logMessage("Upload cancelled","system");break;}setStatus("uploading","progress");try{const fd=new FormData();fd.append("image",imageFile);fd.append("mask",maskFile);const json=await uploadFormData("/detect-shapes",fd);logMessage("Job started: "+JSON.stringify(json),"system");setStatus("processing");if(json.jobId)trackJob(json.jobId);}catch(e){logMessage("Error: "+e.message,"error");setStatus("error","error");}break;}case"/embroider":{const imageFile=await pickFile("image/*");if(!imageFile){logMessage("Upload cancelled","system");break;}const maskFile=await pickFile("image/*");if(!maskFile){logMessage("Upload cancelled","system");break;}setStatus("uploading","progress");try{const fd=new FormData();fd.append("image",imageFile);fd.append("mask",maskFile);const json=await uploadFormData("/generate-embroidery",fd);logMessage("Job started: "+JSON.stringify(json),"system");setStatus("processing");if(json.jobId)trackJob(json.jobId);}catch(e){logMessage("Error: "+e.message,"error");setStatus("error","error");}break;}case"/status":{if(!arg){logMessage("Usage: /status <jobId>","error");break;}try{const res=await fetch("/job-status/"+encodeURIComponent(arg));const json=await res.json();logMessage("Status: "+JSON.stringify(json),"system");}catch(e){logMessage("Error: "+e.message,"error");}break;}case"/preview":{if(!arg){logMessage("Usage: /preview <id>","error");break;}const url="/preview/"+encodeURIComponent(arg);logMessage("Opening: "+url,"system");window.open(url,"_blank");break;}case"/download":{if(!arg){logMessage("Usage: /download <id>","error");break;}const url="/download/"+encodeURIComponent(arg);logMessage("Download link: "+url,"system");window.open(url,"_blank");break;}default:logMessage('Unknown command: "'+cmd+'". Type /help for commands.','error');}}finally{setProcessing(false);}}chatForm.addEventListener("submit",(e)=>{e.preventDefault();const text=chatInput.value.trim();if(!text||processing)return;if(text.length>MAX_INPUT){logMessage("Message exceeds "+MAX_INPUT+" characters","error");return;}logMessage(text,"user");chatInput.value="";chatInput.style.height="auto";if(text.startsWith("/")){handleCommand(text);}else{logMessage('Type /help for commands. Received: "'+text+'"',"system");}});chatInput.addEventListener("keydown",(e)=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();chatForm.dispatchEvent(new Event("submit",{cancelable:true}));}});initSocket();logMessage('Ready. Type /help for commands.','system');})();</script>
  </body>
</html>
