<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stichai v6.2 — AI Embroidery Digitization</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;color:#333}
.container{max-width:1200px;margin:0 auto;padding:20px}
.header{text-align:center;padding:40px 20px;color:#fff}
.header h1{font-size:2.5rem;margin-bottom:10px}
.header p{font-size:1.1rem;opacity:.9}
.upload-section{background:#fff;border-radius:16px;padding:40px;margin:20px 0;box-shadow:0 10px 40px rgba(0,0,0,.1)}
.drop-zone{border:3px dashed #667eea;border-radius:12px;padding:60px 20px;text-align:center;cursor:pointer}
.drop-zone:hover{border-color:#764ba2;background:#f8f7ff}
#previewImg{max-width:100%;max-height:300px;border-radius:8px;display:none}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:30px 0}
.setting-group label{display:block;font-weight:600;margin-bottom:8px;color:#555}
.setting-group select{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px}
.submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:1.2rem;font-weight:600;cursor:pointer;margin-top:20px}
.submit-btn:disabled{opacity:.6}
.progress-bar{display:none;margin-top:20px;height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden}
.progress-bar.active{display:block}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#667eea,#764ba2);transition:width .5s}
.preview-section{display:none;background:#fff;border-radius:16px;padding:40px;margin:20px 0}
.preview-section.active{display:block}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:30px}
.preview-box{text-align:center;background:#fafafa;border-radius:12px;padding:20px}
.preview-box h3{margin-bottom:15px;color:#555;font-size:1rem;text-transform:uppercase}
.preview-box img,.preview-box canvas{max-width:100%;border-radius:8px;display:none}
.preview-box canvas{border:1px solid #e0e0e0;background:#f5f0e8}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:15px;margin:30px 0}
.stat-card{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px;border-radius:12px;text-align:center}
.stat-card .value{font-size:1.8rem;font-weight:700}
.color-palette{display:flex;gap:15px;justify-content:center;flex-wrap:wrap;margin:20px 0}
.color-circle{width:50px;height:50px;border-radius:50%;border:3px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.download-section{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #f0f0f0}
.download-btn{display:inline-flex;align-items:center;gap:10px;padding:16px 32px;background:linear-gradient(135deg,#4CAF50,#45a049);color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:600;cursor:pointer;text-decoration:none}
.zoom-controls{display:flex;gap:8px;justify-content:center;margin-top:10px}
.zoom-btn{padding:8px 16px;background:#f0f0f0;border:none;border-radius:6px;cursor:pointer}
.footer{text-align:center;padding:40px;color:#fff;opacity:.8}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>Stichai</h1><p>AI Embroidery Digitization — Real Stitch Files</p></div>

<div class="upload-section">
<div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
<div id="uploadPrompt">
<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
<p style="margin-top:15px;font-size:1.1rem;color:#555">Drop your design here or click to upload</p>
<p style="margin-top:5px;font-size:.9rem;color:#888">JPG, PNG — We will trace shapes and generate stitches</p>
</div>
<img id="previewImg" alt="Preview">
</div>
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">

<div class="settings-grid">
<div class="setting-group"><label>Stitch Type</label><select id="stitchType"><option value="auto">Auto</option><option value="fill">Fill</option><option value="satin">Satin</option><option value="running">Running</option></select></div>
<div class="setting-group"><label>Quality</label><select id="quality"><option value="standard">Standard</option><option value="high">High</option><option value="economy">Economy</option></select></div>
<div class="setting-group"><label>File Format</label><select id="fileType"><option value="dst">DST</option><option value="pes">PES</option><option value="jef">JEF</option><option value="exp">EXP</option><option value="vp3">VP3</option></select></div>
</div>

<button class="submit-btn" id="submitBtn" onclick="submitOrder()">Trace Shapes & Generate Stitches</button>
<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="preview-section" id="previewSection">
<div class="preview-grid">
<div class="preview-box"><h3>Original Design</h3><img id="previewOriginal" alt="Original"></div>
<div class="preview-box"><h3>Stitch Simulation</h3><canvas id="stitchCanvas" width="300" height="300"></canvas><div class="zoom-controls"><button class="zoom-btn" onclick="zoomCanvas(0.8)">-</button><button class="zoom-btn" onclick="zoomCanvas(1.0)">Reset</button><button class="zoom-btn" onclick="zoomCanvas(1.2)">+</button></div></div>
</div>

<div class="stats-grid">
<div class="stat-card"><div class="value" id="previewStitches">~0</div><div class="label">Stitches</div></div>
<div class="stat-card"><div class="value" id="previewColors">0</div><div class="label">Colors</div></div>
<div class="stat-card"><div class="value" id="previewTime">0m</div><div class="label">Sew Time</div></div>
<div class="stat-card"><div class="value" id="previewSize">80x80</div><div class="label">mm</div></div>
</div>

<div class="color-palette" id="colorPalette"></div>

<div class="download-section"><a href="#" class="download-btn" id="downloadFileBtn" onclick="downloadSelectedFormat();return false;">Download <span id="formatLabel">DST</span> File</a></div>
<button class="regenerate-btn" style="margin-top:20px;padding:12px 24px;background:#f0f0f0;border:none;border-radius:8px;cursor:pointer" onclick="regeneratePreview()">New Design</button>
</div>

<div class="footer"><p>Stichai v6.2 — Real embroidery files</p></div>
</div>

<script>
let uploadedFile=null,currentJobId=null,currentStitchData=null,currentZoom=1;

function handleFile(e){
const r=new FileReader();
r.onload=(e)=>{document.getElementById('previewImg').src=e.target.result;document.getElementById('previewImg').style.display='block';document.getElementById('uploadPrompt').style.display='none';document.getElementById('previewOriginal').src=e.target.result;};
r.readAsDataURL(f);
}

function getSettings(){return{stitchType:document.getElementById('stitchType').value,quality:document.getElementById('quality').value,fileType:document.getElementById('fileType').value};}

function renderStitchCanvas(data){
const ctx=c.getContext('2d'),stitches=data.stitches||[],w=data.width||240,h=data.height||240,colors=data.colors||['#c41e3a'];
c.width=w;c.height=h;ctx.fillStyle='#f5f0e8';ctx.fillRect(0,0,w,h);
let currentColor=null,path=[],drawn=0,MAX=5000;
for(let i=0;i<stitches.length&&drawn<MAX;i++){
const s=stitches[i];
if(s.type==='jump'){if(path.length>1)drawThread(ctx,path,currentColor||colors[0]);path=[{x:s.x,y:s.y}];currentColor=s.color;}
if(path.length>100||i===stitches.length-1){if(path.length>1)drawThread(ctx,path,currentColor||colors[0]);if(i<stitches.length-1)path=[path[path.length-1]];}
}
ctx.globalCompositeOperation='multiply';ctx.fillStyle='rgba(139,119,101,0.04)';
for(let x=0;x<w;x+=3)ctx.fillRect(x,0,1,h);for(let y=0;y<h;y+=3)ctx.fillRect(0,y,w,1);
ctx.globalCompositeOperation='source-over';
}

function drawThread(ctx,points,color){
if(points.length<2)return;ctx.strokeStyle=color;ctx.lineWidth=1.8;ctx.lineCap='round';ctx.lineJoin='round';
ctx.beginPath();ctx.moveTo(points[0].x,points[0].y);
for(let i=1;i<points.length;i++)ctx.lineTo(points[i].x,points[i].y);
ctx.stroke();
}

function zoomCanvas(factor){currentZoom*=factor;document.getElementById('stitchCanvas').style.transform=;}

function updateColors(colors){
const p=document.getElementById('colorPalette');p.innerHTML='';
colors.forEach(c=>{const d=document.createElement('div');d.className='color-circle';d.style.background=c;p.appendChild(d);});
}

async function submitOrder(){
const btn=document.getElementById('submitBtn'),bar=document.getElementById('progressBar'),fill=document.getElementById('progressFill'),sec=document.getElementById('previewSection');
btn.disabled=true;btn.textContent='Tracing shapes...';bar.classList.add('active');sec.classList.remove('active');fill.style.width='0%';
let p=0;const iv=setInterval(()=>{p+=2;if(p>95)p=95;fill.style.width=p+'%';},800);
try{
const fd=new FormData();fd.append('image',uploadedFile);
const res=await fetch('/api/analyze-image',{method:'POST',body:fd});
const a=await res.json();if(a.error)throw new Error(a.error);
document.getElementById('previewStitches').textContent='~'+(a.estimated_stitch_count||0).toLocaleString();
document.getElementById('previewColors').textContent=(a.dominant_colors||[]).length;
document.getElementById('previewTime').textContent=Math.ceil((a.estimated_stitch_count||0)/300)+'m';
document.getElementById('previewSize').textContent=(a.width_mm||80)+'x'+(a.height_mm||80);
document.getElementById('previewOriginal').style.display='block';
if(a.stitch_data){currentStitchData=a.stitch_data;renderStitchCanvas(a.stitch_data);document.getElementById('stitchCanvas').style.display='block';}
updateColors(a.dominant_colors||[]);
const s=getSettings(),fmt=s.fileType||'dst',names={dst:'DST',pes:'PES',jef:'JEF',exp:'EXP',vp3:'VP3'};
document.getElementById('formatLabel').textContent=names[fmt]||'DST';
const cfd=new FormData();cfd.append('image',uploadedFile);cfd.append('settings',JSON.stringify(s));cfd.append('phone','web_'+Date.now());
const cres=await fetch('/api/convert',{method:'POST',body:cfd});
if(cres.ok){const cd=await cres.json();currentJobId=cd.jobId;}
sec.classList.add('active');setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),300);
}catch(e){alert('Error: '+e.message);console.error(e);}
finally{btn.disabled=false;btn.textContent='Trace Shapes & Generate Stitches';setTimeout(()=>{bar.classList.remove('active');fill.style.width='0%';},2000);}
}

function downloadSelectedFormat(){
const a=document.createElement('a');a.href='/api/download/'+currentJobId;
a.download='embroidery.'+(getSettings().fileType||'dst');document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function regeneratePreview(){
document.getElementById('previewSection').classList.remove('active');
document.getElementById('stitchCanvas').style.display='none';
document.getElementById('previewOriginal').style.display='none';
currentZoom=1;document.getElementById('stitchCanvas').style.transform='scale(1)';
document.getElementById('submitBtn').disabled=false;
window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
