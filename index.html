<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stichai — AI Embroidery Digitizer</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f3f0ea; color: #2c2c2c;
  }
  header {
    background: #1a1a2e; color: #fff; padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }
  .badge {
    background: #e94560; color: #fff; padding: 4px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 600;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 24px; }
  .card {
    background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .dropzone {
    border: 2px dashed #c7c7c7; border-radius: 12px; padding: 48px 24px;
    text-align: center; cursor: pointer; transition: border-color .2s;
  }
  .dropzone:hover, .dropzone.dragover { border-color: #e94560; }
  .dropzone input { display: none; }
  .btn {
    display: inline-block; background: #e94560; color: #fff; border: none;
    padding: 12px 28px; border-radius: 8px; font-size: 15px; cursor: pointer;
    font-weight: 600; transition: background .2s;
  }
  .btn:hover { background: #d13650; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .btn-secondary { background: #16213e; }
  .btn-secondary:hover { background: #0f1a30; }
  .preview-wrap {
    position: relative; width: 100%; background: #fff;
    border: 1px solid #d4cfc5; border-radius: 12px; overflow: hidden;
  }
  .preview-wrap img { display: block; width: 100%; height: auto; }
  canvas { display: block; width: 100%; height: auto; }
  .compare-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  @media (max-width: 640px) {
    .compare-grid { grid-template-columns: 1fr; }
  }
  .compare-label {
    font-size: 12px; font-weight: 600; color: #666;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .controls {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 16px;
  }
  select {
    padding: 10px 14px; border-radius: 8px; border: 1px solid #ccc;
    font-size: 14px; background: #fff;
  }
  .meta { font-size: 13px; color: #666; margin-top: 8px; }
  .shapes {
    display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px; font-size: 12px;
    background: #f0f0f0; border: 1px solid #ddd;
  }
  .chip span { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .error { color: #c0392b; background: #fdecea; padding: 12px; border-radius: 8px; margin-top: 12px; }
  .stage-label {
    font-size: 11px; font-weight: 700; color: #999;
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
<header>
  <h1>STICHAI</h1>
  <div class="badge">AI Embroidery</div>
</header>

<div class="container">
  <!-- Stage 1: Upload -->
  <div class="card" id="uploadCard">
    <div class="stage-label">Step 1: Upload your photo</div>
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept="image/*">
      <p><strong>Drop a photo here</strong> or click to choose</p>
      <p class="meta">JPG, PNG — max 10 MB</p>
    </div>
    <div style="text-align:center; margin-top:16px;">
      <button class="btn" id="cleanBtn" disabled>Clean & simplify photo</button>
    </div>
    <div id="status"></div>
  </div>

  <!-- Stage 2: Cleaned 2D photo -->
  <div class="card" id="cleanCard" style="display:none;">
    <div class="stage-label">Step 2: Review simplified 2D version</div>
    <div class="compare-grid">
      <div>
        <div class="compare-label">Original Photo</div>
        <div class="preview-wrap">
          <img id="originalImg" alt="Original" />
        </div>
      </div>
      <div>
        <div class="compare-label">Simplified 2D (for embroidery)</div>
        <div class="preview-wrap">
          <img id="cleanedImg" alt="Cleaned" />
        </div>
      </div>
    </div>
    <div style="text-align:center; margin-top:16px;">
      <button class="btn" id="generateBtn">Generate stitches from 2D version</button>
    </div>
  </div>

  <!-- Stage 3: Stitch Preview -->
  <div class="card" id="resultCard" style="display:none;">
    <div class="stage-label">Step 3: Stitch preview & download</div>
    <div class="compare-grid">
      <div>
        <div class="compare-label">2D Reference</div>
        <div class="preview-wrap">
          <img id="resultCleanedImg" alt="Cleaned" />
        </div>
      </div>
      <div>
        <div class="compare-label">Stitch Preview</div>
        <div class="preview-wrap">
          <canvas id="stitchCanvas" width="800" height="800"></canvas>
        </div>
      </div>
    </div>
    <div class="shapes" id="shapes"></div>
    <div class="controls">
      <select id="formatSel">
        <option value="dst">DST (Tajima)</option>
        <option value="pes">PES (Brother)</option>
        <option value="jef">JEF (Janome)</option>
        <option value="exp">EXP (Melco)</option>
        <option value="vp3">VP3 (Husqvarna)</option>
      </select>
      <button class="btn btn-secondary" id="downloadBtn">Download file</button>
    </div>
    <div class="meta" id="meta"></div>
  </div>
</div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const cleanBtn = document.getElementById('cleanBtn');
  const generateBtn = document.getElementById('generateBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const statusEl = document.getElementById('status');
  const uploadCard = document.getElementById('uploadCard');
  const cleanCard = document.getElementById('cleanCard');
  const resultCard = document.getElementById('resultCard');
  const originalImg = document.getElementById('originalImg');
  const cleanedImg = document.getElementById('cleanedImg');
  const resultCleanedImg = document.getElementById('resultCleanedImg');
  const canvas = document.getElementById('stitchCanvas');
  const ctx = canvas.getContext('2d');
  const shapesEl = document.getElementById('shapes');
  const formatSel = document.getElementById('formatSel');
  const metaEl = document.getElementById('meta');

  let currentFile = null;
  let cleanedImageDataUrl = null;
  let cleanedImageBlob = null;
  let currentId = null;

  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

  function handleFile(file) {
    currentFile = file;
    cleanBtn.disabled = false;
    statusEl.innerHTML = `<p style="color:#27ae60;">Ready: <strong>${file.name}</strong></p>`;
  }

  // Step 1: Clean the photo
  cleanBtn.addEventListener('click', async () => {
    if (!currentFile) return;
    cleanBtn.disabled = true;
    statusEl.innerHTML = '<p>Cleaning photo — removing shadows, reflections, converting to flat 2D…</p>';

    const form = new FormData();
    form.append('image', currentFile);

    try {
      const res = await fetch('/clean-photo', { method: 'POST', body: form });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Server error');

      cleanedImageDataUrl = data.cleanedImage;

      // Convert data URL to blob for later upload
      const blobRes = await fetch(cleanedImageDataUrl);
      cleanedImageBlob = await blobRes.blob();

      // Show both images
      const originalReader = new FileReader();
      originalReader.onload = e => {
        originalImg.src = e.target.result;
      };
      originalReader.readAsDataURL(currentFile);

      cleanedImg.src = cleanedImageDataUrl;

      cleanCard.style.display = 'block';
      statusEl.innerHTML = '<p style="color:#27ae60;">Photo cleaned! Review the simplified 2D version below.</p>';
    } catch (e) {
      statusEl.innerHTML = `<div class="error">${e.message}</div>`;
      cleanBtn.disabled = false;
    }
  });

  // Step 2: Generate stitches from cleaned image
  generateBtn.addEventListener('click', async () => {
    if (!cleanedImageBlob) return;
    generateBtn.disabled = true;
    statusEl.innerHTML = '<p>Analyzing 2D image and generating stitches…</p>';

    const form = new FormData();
    form.append('image', cleanedImageBlob, 'cleaned.png');

    try {
      const res = await fetch('/generate-embroidery', { method: 'POST', body: form });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Server error');

      currentId = data.id;
      metaEl.textContent = `${data.stitchCount.toLocaleString()} stitches · Design ${data.designSize.w}×${data.designSize.h} units`;

      // Show 2D ref in result
      resultCleanedImg.src = cleanedImageDataUrl;

      // Build color chips
      shapesEl.innerHTML = '';
      const seen = new Set();
      for (const s of data.shapes || []) {
        if (seen.has(s.color)) continue;
        seen.add(s.color);
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerHTML = `<span style="background:${s.color}"></span> ${s.type}`;
        shapesEl.appendChild(chip);
      }

      // Fetch preview data and render
      const pRes = await fetch(data.previewUrl);
      const pData = await pRes.json();
      renderCanvas(pData);

      resultCard.style.display = 'block';
      statusEl.innerHTML = '<p style="color:#27ae60;">Done! Compare the 2D reference with the stitch preview.</p>';
    } catch (e) {
      statusEl.innerHTML = `<div class="error">${e.message}</div>`;
      generateBtn.disabled = false;
    }
  });

  downloadBtn.addEventListener('click', () => {
    if (!currentId) return;
    const fmt = formatSel.value;
    window.location = `/download/${currentId}/${fmt}`;
  });

  function renderCanvas(data) {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = 800 * dpr;
    canvas.height = 800 * dpr;
    canvas.style.width = '100%';
    canvas.style.height = 'auto';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const W = 800;
    const H = 800;
    const { stitches, designW, designH, shapes } = data;

    // Fabric background
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(0, 0, W, H);

    const scale = Math.min(W / (designW + 20), H / (designH + 20));
    const offX = (W - designW * scale) / 2;
    const offY = (H - designH * scale) / 2;

    const tx = x => offX + x * scale;
    const ty = y => offY + y * scale;

    // Draw shapes as filled regions
    for (const s of shapes || []) {
      ctx.fillStyle = s.color || '#888';
      ctx.globalAlpha = 0.35;
      ctx.fillRect(tx(s.x), ty(s.y), (s.width || 10) * scale, (s.height || 10) * scale);
      ctx.globalAlpha = 1.0;
      ctx.strokeStyle = s.color || '#888';
      ctx.lineWidth = 0.6;
      ctx.strokeRect(tx(s.x), ty(s.y), (s.width || 10) * scale, (s.height || 10) * scale);
    }

    // Group stitches by color and draw thread paths
    const groups = [];
    let current = null;
    for (const st of stitches || []) {
      if (!current || current.color !== st.color) {
        current = { color: st.color, points: [] };
        groups.push(current);
      }
      current.points.push({ x: tx(st.x), y: ty(st.y) });
    }

    for (const g of groups) {
      // Glow/shadow for thread visibility
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (let i = 0; i < g.points.length; i++) {
        const p = g.points[i];
        if (i === 0) ctx.moveTo(p.x + 0.5, p.y + 0.5);
        else ctx.lineTo(p.x + 0.5, p.y + 0.5);
      }
      ctx.stroke();

      // Actual thread
      ctx.beginPath();
      ctx.strokeStyle = g.color;
      ctx.lineWidth = 1.0;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (let i = 0; i < g.points.length; i++) {
        const p = g.points[i];
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }
  }
</script>
</body>
</html>
