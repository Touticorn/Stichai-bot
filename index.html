<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stichai — AI Embroidery Digitizer</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f3f0ea; color: #2c2c2c;
  }
  header {
    background: #1a1a2e; color: #fff; padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }
  .badge {
    background: #e94560; color: #fff; padding: 4px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 600;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 24px; }
  .card {
    background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .dropzone {
    border: 2px dashed #c7c7c7; border-radius: 12px; padding: 48px 24px;
    text-align: center; cursor: pointer; transition: border-color .2s;
  }
  .dropzone:hover, .dropzone.dragover { border-color: #e94560; }
  .dropzone input { display: none; }
  .btn {
    display: inline-block; background: #e94560; color: #fff; border: none;
    padding: 12px 28px; border-radius: 8px; font-size: 15px; cursor: pointer;
    font-weight: 600; transition: background .2s;
  }
  .btn:hover { background: #d13650; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .btn-secondary { background: #16213e; }
  .btn-secondary:hover { background: #0f1a30; }
  .preview-wrap {
    position: relative; width: 100%; max-width: 600px; margin: 0 auto;
    background: repeating-linear-gradient(45deg, #e8e4da 0, #e8e4da 2px, #f5f0e8 2px, #f5f0e8 8px);
    border: 1px solid #d4cfc5; border-radius: 12px; overflow: hidden;
  }
  canvas { display: block; width: 100%; height: auto; }
  .controls {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 16px;
  }
  select {
    padding: 10px 14px; border-radius: 8px; border: 1px solid #ccc;
    font-size: 14px; background: #fff;
  }
  .meta { font-size: 13px; color: #666; margin-top: 8px; }
  .shapes {
    display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px; font-size: 12px;
    background: #f0f0f0; border: 1px solid #ddd;
  }
  .chip span { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .error { color: #c0392b; background: #fdecea; padding: 12px; border-radius: 8px; margin-top: 12px; }
</style>
</head>
<body>
<header>
  <h1>STICHAI</h1>
  <div class="badge">AI Embroidery</div>
</header>

<div class="container">
  <!-- Upload -->
  <div class="card">
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept="image/*">
      <p><strong>Drop a photo here</strong> or click to choose</p>
      <p class="meta">JPG, PNG — max 10 MB</p>
    </div>
    <div style="text-align:center; margin-top:16px;">
      <button class="btn" id="generateBtn" disabled>Generate stitches</button>
    </div>
    <div id="status"></div>
  </div>

  <!-- Preview -->
  <div class="card" id="resultCard" style="display:none;">
    <h3 style="margin-top:0;">Stitch Preview</h3>
    <div class="preview-wrap">
      <canvas id="stitchCanvas" width="600" height="600"></canvas>
    </div>
    <div class="shapes" id="shapes"></div>
    <div class="controls">
      <select id="formatSel">
        <option value="dst">DST (Tajima)</option>
        <option value="pes">PES (Brother)</option>
        <option value="jef">JEF (Janome)</option>
        <option value="exp">EXP (Melco)</option>
        <option value="vp3">VP3 (Husqvarna)</option>
      </select>
      <button class="btn btn-secondary" id="downloadBtn">Download file</button>
    </div>
    <div class="meta" id="meta"></div>
  </div>
</div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const generateBtn = document.getElementById('generateBtn');
  const statusEl = document.getElementById('status');
  const resultCard = document.getElementById('resultCard');
  const canvas = document.getElementById('stitchCanvas');
  const ctx = canvas.getContext('2d');
  const shapesEl = document.getElementById('shapes');
  const formatSel = document.getElementById('formatSel');
  const downloadBtn = document.getElementById('downloadBtn');
  const metaEl = document.getElementById('meta');

  let currentFile = null;
  let currentId = null;

  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

  function handleFile(file) {
    currentFile = file;
    generateBtn.disabled = false;
    statusEl.innerHTML = `<p style="color:#27ae60;">Ready: <strong>${file.name}</strong></p>`;
  }

  generateBtn.addEventListener('click', async () => {
    if (!currentFile) return;
    generateBtn.disabled = true;
    statusEl.innerHTML = '<p>Analyzing image and generating stitches…</p>';

    const form = new FormData();
    form.append('image', currentFile);

    try {
      const res = await fetch('/generate-embroidery', { method: 'POST', body: form });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Server error');

      currentId = data.id;
      metaEl.textContent = `${data.stitchCount.toLocaleString()} stitches · Design ${data.designSize.w}×${data.designSize.h} units`;

      // Build color chips
      shapesEl.innerHTML = '';
      const seen = new Set();
      for (const s of data.shapes || []) {
        if (seen.has(s.color)) continue;
        seen.add(s.color);
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerHTML = `<span style="background:${s.color}"></span> ${s.type}`;
        shapesEl.appendChild(chip);
      }

      // Fetch preview data and render
      const pRes = await fetch(data.previewUrl);
      const pData = await pRes.json();
      renderCanvas(pData);

      resultCard.style.display = 'block';
      statusEl.innerHTML = '<p style="color:#27ae60;">Done! Preview below.</p>';
    } catch (e) {
      statusEl.innerHTML = `<div class="error">${e.message}</div>`;
      generateBtn.disabled = false;
    }
  });

  downloadBtn.addEventListener('click', () => {
    if (!currentId) return;
    const fmt = formatSel.value;
    window.location = `/download/${currentId}/${fmt}`;
  });

  function renderCanvas(data) {
    const W = canvas.width;
    const H = canvas.height;
    const { stitches, designW, designH, shapes } = data;

    // Fabric background
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(0, 0, W, H);

    // Subtle grid
    ctx.strokeStyle = 'rgba(0,0,0,0.04)';
    ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 20) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
    for (let i = 0; i < H; i += 20) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke(); }

    const scale = Math.min(W / (designW + 20), H / (designH + 20));
    const offX = (W - designW * scale) / 2;
    const offY = (H - designH * scale) / 2;

    // Helper to transform coordinates
    const tx = x => offX + x * scale;
    const ty = y => offY + y * scale;

    // Draw shapes as filled regions (30% opacity)
    for (const s of shapes || []) {
      ctx.fillStyle = s.color || '#888';
      ctx.globalAlpha = 0.25;
      ctx.fillRect(tx(s.x), ty(s.y), (s.width || 10) * scale, (s.height || 10) * scale);
      ctx.globalAlpha = 1.0;
      ctx.strokeStyle = s.color || '#888';
      ctx.lineWidth = 1;
      ctx.strokeRect(tx(s.x), ty(s.y), (s.width || 10) * scale, (s.height || 10) * scale);
    }

    // Group stitches by color and draw thread paths
    const groups = [];
    let current = null;
    for (const st of stitches || []) {
      if (!current || current.color !== st.color) {
        current = { color: st.color, points: [] };
        groups.push(current);
      }
      current.points.push({ x: tx(st.x), y: ty(st.y) });
    }

    for (const g of groups) {
      ctx.beginPath();
      ctx.strokeStyle = g.color;
      ctx.lineWidth = 1.6;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (let i = 0; i < g.points.length; i++) {
        const p = g.points[i];
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }
  }
</script>
</body>
</html>
