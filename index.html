<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stichai — AI Embroidery Digitizer</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f3f0ea; color: #2c2c2c;
  }
  header {
    background: #1a1a2e; color: #fff; padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }
  .badge {
    background: #e94560; color: #fff; padding: 4px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 600;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .card {
    background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .dropzone {
    border: 2px dashed #c7c7c7; border-radius: 12px; padding: 48px 24px;
    text-align: center; cursor: pointer; transition: border-color .2s;
  }
  .dropzone:hover, .dropzone.dragover { border-color: #e94560; }
  .dropzone input { display: none; }
  .btn {
    display: inline-block; background: #e94560; color: #fff; border: none;
    padding: 12px 28px; border-radius: 8px; font-size: 15px; cursor: pointer;
    font-weight: 600; transition: background .2s;
  }
  .btn:hover { background: #d13650; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .btn-secondary { background: #16213e; }
  .btn-secondary:hover { background: #0f1a30; }
  .photo-wrap, .preview-wrap {
    position: relative; width: 100%;
    border: 1px solid #d4cfc5; border-radius: 12px; overflow: hidden;
    background: #fff;
  }
  .photo-wrap img { display: block; width: 100%; height: auto; }
  canvas { display: block; width: 100%; height: auto; }
  .compare-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  }
  @media (max-width: 720px) {
    .compare-grid { grid-template-columns: 1fr; }
  }
  .compare-label {
    font-size: 12px; font-weight: 700; color: #666;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .controls {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 16px;
  }
  select {
    padding: 10px 14px; border-radius: 8px; border: 1px solid #ccc;
    font-size: 14px; background: #fff;
  }
  .meta { font-size: 13px; color: #666; margin-top: 8px; }
  .colors-bar {
    display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
  }
  .color-dot {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 16px; font-size: 11px; font-weight: 600;
    background: #f5f5f5; border: 1px solid #ddd;
  }
  .color-dot span {
    width: 14px; height: 14px; border-radius: 50%; display: inline-block; border: 1px solid rgba(0,0,0,0.1);
  }
  .error { color: #c0392b; background: #fdecea; padding: 12px; border-radius: 8px; margin-top: 12px; }
  .stage-label {
    font-size: 11px; font-weight: 700; color: #999;
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .detail-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
    gap: 6px; margin-top: 12px;
  }
  .detail-chip {
    border-radius: 6px; min-height: 40px;
    display: flex; align-items: flex-end; justify-content: center;
    padding: 4px; font-size: 9px; font-weight: 600;
    color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    border: 1px solid rgba(0,0,0,0.1);
  }
</style>
</head>
<body>
<header>
  <h1>STICHAI</h1>
  <div class="badge">AI Embroidery</div>
</header>

<div class="container">
  <!-- Upload -->
  <div class="card" id="uploadCard">
    <div class="stage-label">Step 1: Upload your photo</div>
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept="image/*">
      <p><strong>Drop a photo here</strong> or click to choose</p>
      <p class="meta">JPG, PNG — max 10 MB</p>
    </div>
    <div style="text-align:center; margin-top:16px;">
      <button class="btn" id="generateBtn" disabled>Analyze & generate stitches</button>
    </div>
    <div id="status"></div>
  </div>

  <!-- Original Photo -->
  <div class="card" id="photoCard" style="display:none;">
    <div class="stage-label">Original Photo</div>
    <div class="photo-wrap">
      <img id="originalImg" alt="Original upload" />
    </div>
  </div>

  <!-- Results: Original vs Stitch Preview -->
  <div class="card" id="resultCard" style="display:none;">
    <div class="stage-label">Results — Original photo vs Stitch preview</div>
    <div class="compare-grid">
      <div>
        <div class="compare-label">Original Photo</div>
        <div class="photo-wrap">
          <img id="resultOriginalImg" alt="Original" />
        </div>
        <div class="compare-label" style="margin-top:16px;">Detected Colors</div>
        <div class="colors-bar" id="colorsBar"></div>
        <div class="compare-label" style="margin-top:12px;">Extracted Shapes</div>
        <div class="detail-grid" id="detailGrid"></div>
      </div>
      <div>
        <div class="compare-label">Stitch Preview</div>
        <div class="preview-wrap">
          <canvas id="stitchCanvas" width="800" height="800"></canvas>
        </div>
      </div>
    </div>
    <div class="controls">
      <select id="formatSel">
        <option value="dst">DST (Tajima)</option>
        <option value="pes">PES (Brother)</option>
        <option value="jef">JEF (Janome)</option>
        <option value="exp">EXP (Melco)</option>
        <option value="vp3">VP3 (Husqvarna)</option>
      </select>
      <button class="btn btn-secondary" id="downloadBtn">Download file</button>
    </div>
    <div class="meta" id="meta"></div>
  </div>
</div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const generateBtn = document.getElementById('generateBtn');
  const statusEl = document.getElementById('status');
  const photoCard = document.getElementById('photoCard');
  const resultCard = document.getElementById('resultCard');
  const originalImg = document.getElementById('originalImg');
  const resultOriginalImg = document.getElementById('resultOriginalImg');
  const colorsBar = document.getElementById('colorsBar');
  const detailGrid = document.getElementById('detailGrid');
  const canvas = document.getElementById('stitchCanvas');
  const ctx = canvas.getContext('2d');
  const formatSel = document.getElementById('formatSel');
  const downloadBtn = document.getElementById('downloadBtn');
  const metaEl = document.getElementById('meta');

  let currentFile = null;
  let currentImageDataUrl = null;
  let currentId = null;

  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

  function handleFile(file) {
    currentFile = file;
    generateBtn.disabled = false;
    statusEl.innerHTML = `<p style="color:#27ae60;">Ready: <strong>${file.name}</strong></p>`;
    const reader = new FileReader();
    reader.onload = e => {
      currentImageDataUrl = e.target.result;
      originalImg.src = currentImageDataUrl;
      photoCard.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  generateBtn.addEventListener('click', async () => {
    if (!currentFile) return;
    generateBtn.disabled = true;
    statusEl.innerHTML = '<p>Preprocessing photo (denoise, contrast, color boost), detecting colors with AI, tracing pixel shapes in LAB color space…</p>';

    const form = new FormData();
    form.append('image', currentFile);

    try {
      const res = await fetch('/generate-embroidery', { method: 'POST', body: form });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Server error');

      currentId = data.id;
      const det = data.detection || {};
      const tags = [];
      if (det.is_text) tags.push('text');
      if (det.is_logo) tags.push('logo');
      const tagStr = tags.length ? ` · ${tags.join('+')}` : '';
      metaEl.textContent = `${data.stitchCount.toLocaleString()} stitches · ${data.shapes.length} shapes · ${data.designSize.w}×${data.designSize.h} units${tagStr} · ${det.method || 'pixel'}`;

      resultOriginalImg.src = currentImageDataUrl;

      // Show detected colors
      colorsBar.innerHTML = '';
      for (const c of data.colors || []) {
        const dot = document.createElement('div');
        dot.className = 'color-dot';
        dot.innerHTML = `<span style="background:${c}"></span> ${c}`;
        colorsBar.appendChild(dot);
      }

      // Show shape detail chips
      detailGrid.innerHTML = '';
      for (const s of data.shapes || []) {
        const chip = document.createElement('div');
        chip.className = 'detail-chip';
        chip.style.backgroundColor = s.color || '#888';
        chip.textContent = `${s.type} · ${s.pointCount || (s.points?.length || 0)}pts`;
        detailGrid.appendChild(chip);
      }

      // Fetch and render stitch preview
      const pRes = await fetch(data.previewUrl);
      const pData = await pRes.json();
      renderCanvas(pData);

      resultCard.style.display = 'block';
      statusEl.innerHTML = '<p style="color:#27ae60;">Done! Compare the original with the stitch preview. Each shape is traced from actual pixels.</p>';
    } catch (e) {
      statusEl.innerHTML = `<div class="error">${e.message}</div>`;
      generateBtn.disabled = false;
    }
  });

  downloadBtn.addEventListener('click', () => {
    if (!currentId) return;
    window.location = `/download/${currentId}/${formatSel.value}`;
  });

  function renderCanvas(data) {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = 800 * dpr;
    canvas.height = 800 * dpr;
    canvas.style.width = '100%';
    canvas.style.height = 'auto';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const W = 800, H = 800;
    const { stitches, designW, designH, shapes } = data;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(0, 0, W, H);

    const scale = Math.min(W / (designW + 20), H / (designH + 20));
    const offX = (W - designW * scale) / 2;
    const offY = (H - designH * scale) / 2;
    const tx = x => offX + x * scale;
    const ty = y => offY + y * scale;

    // Draw faint polygon outlines
    for (const s of shapes || []) {
      const pts = s.points || [];
      if (pts.length < 2) continue;
      ctx.beginPath();
      ctx.moveTo(tx(pts[0][0]), ty(pts[0][1]));
      for (let i = 1; i < pts.length; i++) ctx.lineTo(tx(pts[i][0]), ty(pts[i][1]));
      ctx.closePath();
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    // Draw stitches by color group
    const groups = [];
    let current = null;
    for (const st of stitches || []) {
      if (!current || current.color !== st.color) {
        current = { color: st.color, points: [] };
        groups.push(current);
      }
      current.points.push({ x: tx(st.x), y: ty(st.y) });
    }

    for (const g of groups) {
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (let i = 0; i < g.points.length; i++) {
        const p = g.points[i];
        if (i === 0) ctx.moveTo(p.x + 0.5, p.y + 0.5);
        else ctx.lineTo(p.x + 0.5, p.y + 0.5);
      }
      ctx.stroke();

      ctx.beginPath();
      ctx.strokeStyle = g.color;
      ctx.lineWidth = 1.0;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (let i = 0; i < g.points.length; i++) {
        const p = g.points[i];
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }
  }
</script>
</body>
</html>
